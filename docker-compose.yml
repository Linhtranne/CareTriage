version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: caretriage-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: caretriage
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: caretriage-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: caretriage
      DB_USERNAME: linhtranne
      DB_PASSWORD: 123456
      JWT_SECRET: ${JWT_SECRET:-caretriage-docker-secret-key-min-256-bits-long-for-hmac-sha256}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_INTERNAL_KEY: ${INTERNAL_API_KEY:-caretriage-internal-secret-for-dev-only-min-32-chars-long}
    depends_on:
      mysql:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    container_name: caretriage-ai
    expose:
      - "8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-caretriage-internal-secret-for-dev-only-min-32-chars-long}

  frontend:
    build: ./frontend
    container_name: caretriage-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin-frontend:
    build: ./admin-frontend
    container_name: caretriage-admin
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mysql_data:
