spring:
  application:
    name: caretriage-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:caretriage}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:linhtranne}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:caretriage-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # AI Service
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}

# Logging
logging:
  level:
    com.caretriage: DEBUG
    org.springframework.security: INFO
