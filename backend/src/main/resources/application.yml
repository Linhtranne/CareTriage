spring:
  profiles:
    active: prod # Chuyển sang profile prod để dùng MySQL
  application:
    name: caretriage-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:caretriage}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:linhtranne}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never # Ngăn chặn chạy data.sql gây lỗi trùng lặp dữ liệu

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 10MB

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:caretriage-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # AI Service
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
    internal-api-key: ${AI_SERVICE_INTERNAL_KEY:Z9jzNTEwSMh4hQBsHLi0RBsW5fl995ZNOYEMHMckE4E=}

  # Firebase Storage
  firebase:
    config-path: ${FIREBASE_CONFIG_PATH:config/firebase-service-account.json}
    bucket-name: ${FIREBASE_BUCKET_NAME:caretriage.appspot.com}

# Logging
logging:
  level:
    com.caretriage: DEBUG
    org.springframework.security: INFO
