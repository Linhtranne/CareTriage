spring:
  datasource:
    url: jdbc:h2:mem:caretriage;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  sql:
    init:
      mode: always

app:
  jwt:
    secret: caretriage-super-secret-key-that-is-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
